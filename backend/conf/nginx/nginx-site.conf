server {
    # Render provisions and terminates SSL, so we listen on port 80
    listen 80;

    # Respond to any incoming request domain
    server_name _;

    root /var/www/html/public;
    index index.html index.htm index.php;

    # Disable sendfile to prevent file caching issues
    sendfile off;

    # Forward logs directly to stdout so they appear in your Render dashboard
    error_log /dev/stdout info;
    access_log /dev/stdout;

    # Laravel's routing engine handler
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass the PHP scripts to FastCGI server listening inside the container
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Block access to hidden apache config files (like .htaccess)
    location ~ /\.ht {
        deny all;
    }
}